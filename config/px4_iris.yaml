# Simulation configuration for the PX4 Iris quadrotor.
# Corresponds to PX4 airframe 10016 (none_iris / 3DR Iris).
#
# Physical parameters sourced from the 3DR Iris gazebo-classic SDF.
# Motor layout sourced from PX4 control allocation (PX4_SYS_AUTOSTART=10016).
#
# Motor index convention (matches HIL_ACTUATOR_CONTROLS ordering):
#   Actuator 0 → Motor 0 (front-right in FRD, front-left in FLU)  — CCW
#   Actuator 1 → Motor 1 (rear-left  in FRD, rear-right in FLU)   — CCW
#   Actuator 2 → Motor 2 (front-left in FRD, front-right in FLU)  — CW
#   Actuator 3 → Motor 3 (rear-right in FRD, rear-left  in FLU)   — CW
#
# Frame convention for rotor_positions: FLU (Forward-Left-Up) body frame.
# Conversion from PX4 CA_ROTOR* FRD positions: y_flu = -y_frd, z_flu = -z_frd.
# Because the rotors are above the CoG, z_flu is positive (+0.022 m).

quadrotor:
  # Total vehicle mass [kg] — base_link 1.5 kg + 4 rotors × 0.005 kg (iris.sdf.jinja)
  mass: 1.52
  # Diagonal inertia tensor [Ixx, Iyy, Izz] [kg·m²] — base_link inertia from iris.sdf.jinja
  inertia: [0.029125, 0.029125, 0.055225]

  # Rotor positions in FLU body frame [m]: [x, y, z].
  # PX4 CA_ROTOR* positions are specified in FRD; converted here to FLU:
  #   x_flu =  x_frd
  #   y_flu = -y_frd
  #   z_flu = +0.022  (rotors are above the CoG)
  #
  # Index 0 — CA_ROTOR0: FRD=(+0.1515, +0.2450) → FLU=(+0.1515, -0.2450)  CCW
  # Index 1 — CA_ROTOR1: FRD=(-0.1515, -0.1875) → FLU=(-0.1515, +0.1875)  CCW
  # Index 2 — CA_ROTOR2: FRD=(+0.1515, -0.2450) → FLU=(+0.1515, +0.2450)  CW
  # Index 3 — CA_ROTOR3: FRD=(-0.1515, +0.1875) → FLU=(-0.1515, -0.1875)  CW
  rotor_positions:
    - [ 0.1515, -0.2450, 0.022]   # Motor 0: front-right arm (FLU), CCW
    - [-0.1515,  0.1875, 0.022]   # Motor 1: rear-right  arm (FLU), CCW
    - [ 0.1515,  0.2450, 0.022]   # Motor 2: front-left  arm (FLU), CW
    - [-0.1515, -0.1875, 0.022]   # Motor 3: rear-left   arm (FLU), CW

  # Thrust coefficient: T = ct * omega^2 [N/(rad/s)^2]
  # motorConstant from iris.sdf.jinja (gazebo-classic sitl model).
  ct: 5.84e-06
  # Torque coefficient: Q = cq * omega^2 [N·m/(rad/s)^2]
  # cq = momentConstant * ct = 0.06 * 5.84e-06 = 3.504e-07
  # momentConstant=0.06 from iris.sdf.jinja; matches PX4 CA_ROTOR*_KM=±0.05 ratio.
  cq: 3.504e-07

  # Rotation directions per rotor (-1=CCW, +1=CW viewed from above in FLU).
  # Order matches rotor_positions above (HIL_ACTUATOR_CONTROLS index order).
  rot_dirs: [-1, -1, 1, 1]

  # Minimum rotor speed [rad/s]
  omega_min: 0.0
  # Maximum rotor speed [rad/s] — maxRotVelocity from iris.sdf.jinja
  omega_max: 1100.0

  # Linear drag coefficients [dx, dy, dz] in body frame [kg/s].
  # Applied as F_drag = -diag(drag) * v_body (force proportional to velocity).
  drag: [0.0, 0.0, 0.0]

  # PX4 THR_MDL_FAC: thrust model factor (0.0 = linear, 1.0 = quadratic).
  # The iris airframe uses the default PX4 value of 0.0 (linear thrust curve).
  thr_mdl_fac: 0.0

  # USD asset path relative to the assets directory.
  usd_asset: 'iris_quadrotor/iris_quadrotor.usda'

sensor:
  # --- Gyroscope ---
  # Noise spectral density [rad/s/sqrt(Hz)]
  gyro_noise_density: 3.393696e-04
  # Random-walk coefficient [rad/s*sqrt(Hz)]
  gyro_random_walk: 3.878509e-05
  # Bias correlation time [s]
  gyro_bias_correlation_time: 1000.0
  # Turn-on bias standard deviation [rad/s]
  gyro_turn_on_bias_sigma: 8.726646e-03

  # --- Accelerometer ---
  # Noise spectral density [m/s²/sqrt(Hz)]
  accel_noise_density: 4.0e-03
  # Random-walk coefficient [m/s²*sqrt(Hz)]
  accel_random_walk: 6.0e-03
  # Bias correlation time [s]
  accel_bias_correlation_time: 300.0
  # Turn-on bias standard deviation [m/s²]
  accel_turn_on_bias_sigma: 0.196

  # --- GPS ---
  # Horizontal position random walk [(m/s)/sqrt(Hz)]
  gps_xy_random_walk: 2.0
  # Vertical position random walk [(m/s)/sqrt(Hz)]
  gps_z_random_walk: 4.0
  # Horizontal position noise density [m/sqrt(Hz)]
  gps_xy_noise_density: 2.0e-4
  # Vertical position noise density [m/sqrt(Hz)]
  gps_z_noise_density: 4.0e-4
  # Horizontal velocity noise density [(m/s)/sqrt(Hz)]
  gps_vxy_noise_density: 0.2
  # Vertical velocity noise density [(m/s)/sqrt(Hz)]
  gps_vz_noise_density: 0.4
  # GPS noise correlation time [s]
  gps_correlation_time: 60.0

  # --- Barometer ---
  # Pressure drift rate [Pa/s]
  baro_drift_pa_per_sec: 0.0

  # --- Magnetometer ---
  # Noise spectral density [gauss/sqrt(Hz)]
  mag_noise_density: 4.0e-4
  # Random-walk coefficient [gauss*sqrt(Hz)]
  mag_random_walk: 6.4e-6
  # Bias correlation time [s]
  mag_bias_correlation_time: 600.0

  # --- Localization mode ---
  # 'gps':   simulated GPSSensor + magnetometer streamed to PX4 over
  #          MAVLink (HIL_GPS / HIL_SENSOR). PX4's EKF uses GPS+baro+mag.
  # 'mocap': nothing position-related is sent over MAVLink. Isaac's
  #          ROS2PublishOdometry node exposes ground-truth odometry on
  #          /<drone>/isaac_odom; an external bridge is expected to
  #          forward it to /fmu/in/vehicle_visual_odometry.
  # iris is the GPS reference setup.
  localization_mode: gps

gps_origin:
  # Reference latitude [deg]  (default: Nantes, France)
  lat: 47.24926
  # Reference longitude [deg]
  lon: -1.54844
  # Reference altitude above MSL [m]
  alt: 0.0
